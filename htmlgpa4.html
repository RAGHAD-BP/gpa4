<!DOCTYPE html>
<html lang="en">
<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="cssgpa45.css">
    <h1 id="title">GPA Calculator</h1>
</head>
<body>
    <div id="box">
        <div id="courseList">
        <label for="course1" id="coursename">Course 1:</label>
        <br><br>
 
        <label for="grade1">Course grade:</label>
        <select id="grade1" name="grade1" oninput="CalculatePointsCouse()">
            <option value="4">A+</option>
            <option value="3.75">A</option>
            <option value="3.50">B+</option>
            <option value="3">B</option>
            <option value="2.50">C+</option>
            <option value="2">C</option>
            <option value="1.50">D+</option>
            <option value="1">D</option>
            <option value="0">F</option>
        </select>
        <br><br>

        <label for="hours1">Course hours:</label>
        <input type="number" id="hours1" name="hours1" oninput="CalculatePointsCouse()"><br><br>

        <span id="point1">Points: 0</span><br><br>

        </div>
        </div>

        <button id="addCourse" onClick="AddCourse()">Add Course</button>

        <br><br>
        <span >GPA of the semester:<space><span id="gpaS"></span></span>
        <span id="gpaAll">GPA of all semesters:<span id="gpaA"></span></span>
        
        <br><br>

        <button id="Cgpa" onClick="CalculateSGPA()">Calculate GPA</button>

        <p id="result"></p>
    </div>
    <script src="jsgpa.js"></script>
</body>
</html>
