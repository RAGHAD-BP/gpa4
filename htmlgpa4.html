<!DOCTYPE html>
<html lang="en">
<header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator</title>
    <link rel="stylesheet" href="cssgpa45.css">
    <h1 id="title">GPA Calculator</h1>
</head>
<body>
    <div id="box">
        <div id="courseList">
        <label for="course1" id="coursename">Course 1:</label>
        <br><br>
 
        <label for="grade1">Course grade:</label>
        <input type="text" id="grade1" name="grade1"><br><br>

        <label for="hours1">Course hours:</label>
        <input type="text" id="hours1" name="hours1"><br><br>

        <span id="point">Points: 0</span><br><br>

        </div>
        </div>

        <button id="addCourse" onClick="AddCourse()">Add Course</button>

        <br><br>
        <span id="gpaS" >GPA of the semester:</span>
        <span id="gpaAll">GPA of all semesters:</span>
        
        <br><br>

        <button id="Cgpa" onClick="CalculateGPA">Calculate GPA</button>

        <p id="result"></p>
    </div>
    <script src="jsgpa.js"></script>
</body>
</html>
